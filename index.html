<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f5f7" />
    <meta
      name="description"
      content="초급자를 위한 20분 철학 논증 훈련 웹앱"
    />
    <title>철학 논증 훈련</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=20260617" />
    <script type="module" src="./src/app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="앱 탐색">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">∴</span>
          <div>
            <p>20분 훈련</p>
            <h1>철학 논증</h1>
          </div>
        </div>

        <nav class="nav-tabs" aria-label="주요 화면">
          <button class="nav-button active" type="button" data-view="today">오늘</button>
          <button class="nav-button" type="button" data-view="concepts">개념</button>
          <button class="nav-button" type="button" data-view="notes">노트</button>
          <button class="nav-button" type="button" data-view="growth">성장</button>
        </nav>
      </aside>

      <main class="workspace">
        <section class="view active" id="view-today" aria-labelledby="today-title">
          <div class="section-heading">
            <p class="eyebrow">Today</p>
            <h2 id="today-title">오늘의 20분 논증 훈련</h2>
          </div>
          <div id="today-view"></div>
        </section>

        <section class="view" id="view-concepts" aria-labelledby="concepts-title">
          <div class="section-heading">
            <p class="eyebrow">Concepts</p>
            <h2 id="concepts-title">개념 카드</h2>
          </div>
          <div id="concepts-view" class="concept-grid"></div>
        </section>

        <section class="view" id="view-notes" aria-labelledby="notes-title">
          <div class="section-heading">
            <p class="eyebrow">Notes</p>
            <h2 id="notes-title">논증 노트</h2>
          </div>
          <div id="notes-view" class="notes-list"></div>
        </section>

        <section class="view" id="view-growth" aria-labelledby="growth-title">
          <div class="section-heading">
            <p class="eyebrow">Growth</p>
            <h2 id="growth-title">성장 대시보드</h2>
          </div>
          <div id="growth-view"></div>
        </section>
      </main>
    </div>
  </body>
</html>
